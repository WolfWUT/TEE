<!DOCTYPE html>
<html>
<head>
    <style>
        #NEW {
            position: absolute;
            left: 0;
            top: 0;
            width: 33%;
            padding: 20px;
            box-sizing: border-box;
        }

            position: absolute;

            width: 33%;
            top: 0;
        }

            padding: 20px;

        #FYI {

        }
        #check {

            width: 33%;
            padding: 20px;
            box-sizing: border-box;

        #MainTextArea, #closedText, #UPDTextArea, #closedTextArea, #FYITextArea {

            max-width: 500px;
            min-height: 40px;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            border: 2px solid #ccc;
            border-radius: 4px;
            resize: none;
            overflow-y: hidden;
            box-sizing: border-box;
        }
        #Theme {
            width: 500px;
            height: 40px;
            font-size: 16px;
            margin-bottom: 1%;
        }
        #Crit, #System {
            width: 200px;
            height: 40px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 1%;
            margin-right: 1%;
            box-sizing: border-box;
        }
        #myDateTime, #closedDateTime {
            width: 200px;
            height: 20px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 0.5%;
        }
        #ZO {

            height: 40px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 1%;
            margin-right: 1%;
            box-sizing: border-box;
        }
        #TG {
            width: 400px;
            height: auto;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 1%;
            margin-right: 1%;
            box-sizing: border-box;
        }
        #ops, #Business, #timeS, #UPDtime, #TimeCL {
            width: 200px;
            height: 40px;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 16px;
        }
    </style>
</head>
